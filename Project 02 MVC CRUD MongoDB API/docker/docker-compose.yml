version: '3.8'

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: mvc-crud-api-dev
    ports:
      - "3000:3000"
    volumes:
      - ..:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - MONGO_URI=mongodb://mongodb:27017/productdb
      - PORT=3000
    depends_on:
      - mongodb
    command: npm run dev

  mongodb:
    image: mongo:6
    container_name: mvc-crud-mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=
      - MONGO_INITDB_ROOT_PASSWORD=
      - MONGO_INITDB_DATABASE=productdb
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: